# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# Enable clipboard
set-option -g set-clipboard on

# Set prefix to <C-space>
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# vi-mode pane navigation
set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

# Restore clear screen using <Prefix> C-l
bind C-l send-keys 'C-l'

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi
# keybinds
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Opens panes in current directory
bind 'h' split-window -v -c "#{pane_current_path}"
bind 'v' split-window -h -c "#{pane_current_path}"

# Bindings for resizing panes (CTRL + ALT + {h, j, k, l})
bind -n C-M-h resize-pane -L 2
bind -n C-M-j resize-pane -D 2
bind -n C-M-k resize-pane -U 2
bind -n C-M-l resize-pane -R 2

# Binding for synchronize pane toggle (PREFIX + ALT + s)
bind M-s if -F '#{?pane_synchronized,1,0}' \
    "setw synchronize-panes off; display-message 'Synchronize OFF'" \
    "setw synchronize-panes on; display-message 'Synchronize ON'"


# Binding for reloading config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

run '~/.tmux/plugins/tpm/tpm'
