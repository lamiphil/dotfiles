###################
# --- GENERAL --- #
###################

# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"
set -g xterm-keys on
set -g extended-keys on
set -as terminal-features ',xterm-ghostty:extkeys'
set -g mouse on

# Forward Shift+Enter (CSI u) to applications (e.g. OpenCode TUI)
set -s user-keys[0] "\e[13;2u"
bind-key -n User0 send-keys "\e[13;2u"

# Enable clipboard
set-option -g set-clipboard on

# Use prefix: Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi

###################
# --- PLUGINS --- #
###################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'tmux-plugins/tmux-yank'

# Dotbar labels
set -g @tmux-dotbar-session-text ' #S '
set -g @tmux-dotbar-window-status-format ' #{?#{==:#{window_index},1},a,#{?#{==:#{window_index},2},r,#{?#{==:#{window_index},3},s,#{?#{==:#{window_index},4},t,#{?#{==:#{window_index},5},g,#{?#{==:#{window_index},6},m,#{?#{==:#{window_index},7},n,#{window_index}}}}}}}}:#W '

# Pane focus styling
set -g window-style 'fg=colour245,bg=default'
set -g window-active-style 'fg=default,bg=default,nodim'
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour45'

# VI-mode pane navigation
set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

####################
# --- BINDINGS --- #
####################

# Restore clear screen (PREFIX + CRTL + l)
bind C-l send-keys 'C-l'

# Changing windows (SHIFT + ALT + H/L)
bind -n M-H previous-window
bind -n M-L next-window

# Window aliases (PREFIX + a/r/s/t/g/m/n)
bind a select-window -t 1
bind r select-window -t 2
bind s select-window -t 3
bind t select-window -t 4
bind g select-window -t 5
bind m select-window -t 6
bind n select-window -t 7

# Session aliases (PREFIX + A/R/S) and chooser (PREFIX + C)
bind A if-shell 'tmux has-session -t personal 2>/dev/null' 'switch-client -t personal' 'new-session -d -s personal \; switch-client -t personal'
bind R if-shell 'tmux has-session -t work 2>/dev/null' 'switch-client -t work' 'new-session -d -s work \; switch-client -t work'
bind S if-shell 'tmux has-session -t scratch 2>/dev/null' 'switch-client -t scratch' 'new-session -d -s scratch \; switch-client -t scratch'
bind C choose-tree -s

# VI Mode Copy & Pasting
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Opens panes in current directory
bind 'h' split-window -v -c "#{pane_current_path}"
bind 'v' split-window -h -c "#{pane_current_path}"

# Opens windows in current directory
bind 'c' new-window -c "#{pane_current_path}"

# Resizing panes (CTRL + ALT + {h, j, k,l})
bind -n C-M-h resize-pane -L 2
bind -n C-M-j resize-pane -D 2
bind -n C-M-k resize-pane -U 2
bind -n C-M-l resize-pane -R 2

# Synchronize pane toggle (PREFIX + ALT + s)
bind M-s if -F '#{?pane_synchronized,1,0}' \
    "setw synchronize-panes off; display-message 'Synchronize OFF'" \
    "setw synchronize-panes on; display-message 'Synchronize ON'"


# Reloading config (PREFIX + e)
bind e source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# pane movement
bind-key j command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key p command-prompt -p "send pane to:"  "join-pane -t '%%'"

# Load dotbar colors aligned with the terminal palette.
if-shell 'test -f ~/.config/tmux/dotbar-colors.conf' \
    "source-file ~/.config/tmux/dotbar-colors.conf"

run '~/.tmux/plugins/tpm/tpm'
