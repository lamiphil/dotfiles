###################
# --- GENERAL --- #
###################

# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# Enable clipboard
set-option -g set-clipboard on

# Set prefix to <C-space>
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi

###################
# --- PLUGINS --- #
###################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'tmux-plugins/tmux-yank'

# VI-mode pane navigation
set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

####################
# --- BINDINGS --- #
####################

# Restore clear screen (PREFIX + CRTL + l)
bind C-l send-keys 'C-l'

# Changing windows (SHIFT + ALT + H/L)
bind -n M-H previous-window
bind -n M-L next-window

# VI Mode Copy & Pasting
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Opens panes in current directory
bind 'h' split-window -v -c "#{pane_current_path}"
bind 'v' split-window -h -c "#{pane_current_path}"

# Opens windows in current directory
bind 'c' new-window -c "#{pane_current_path}"

# Resizing panes (CTRL + ALT + {Left, Down, Up, Right})
bind -n C-M-Left resize-pane -L 2
bind -n C-M-Down resize-pane -D 2
bind -n C-M-Up resize-pane -U 2
bind -n C-M-Right resize-pane -R 2

# Synchronize pane toggle (PREFIX + ALT + s)
bind M-s if -F '#{?pane_synchronized,1,0}' \
    "setw synchronize-panes off; display-message 'Synchronize OFF'" \
    "setw synchronize-panes on; display-message 'Synchronize ON'"


# Reloading config (PREFIX + r)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# pane movement
bind-key j command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key s command-prompt -p "send pane to:"  "join-pane -t '%%'"

# Charger les couleurs générées depuis pywal
if-shell 'test -f ~/.config/tmux/dotbar-colors.conf' \
    "source-file ~/.config/tmux/dotbar-colors.conf"

run '~/.tmux/plugins/tpm/tpm'
