################
### SOURCES  ###
################
source = ~/.cache/wal/colors-hyprland.conf

################
### MONITORS ###
################


# monitor=eDP-1,preferred,auto,1      # Laptop
monitor=DP-3,3440x1440@144,0x0,1    # PC
# monitor=HDMI-A-1, preferred, mirror, 1 # Télé

# Écran du laptop (source)
monitor = eDP-1, preferred, auto, 1

# Télé en miroir du laptop
monitor = HDMI-A-1, preferred, auto, 1, mirror, eDP-1

#################
### AUTOSTART ###
#################

# Appliquer les couleurs du dernier thème wal
exec-once = wal -R

# Sécurité: verrouille immédiatement au démarrage ou quitte si hyprlock échoue
exec-once = hyprlock || hyprctl dispatch exit

# Démarrer les services principaux
exec-once = waybar & hyprpaper & hypridle
exec-once = swaync                            # Notification Daemon

# Mes applications par défaut
exec-once = hyprctl dispatch exec '[workspace 1 silent] ghostty'
exec-once = hyprctl dispatch exec '[workspace 2 silent] vivaldi'
exec-once = hyprctl dispatch exec '[workspace 3 silent] obsidian'
exec-once = hyprctl dispatch exec '[workspace 4 silent] discord'
exec-once = hyprctl dispatch exec '[workspace 5 silent] thunderbird'
exec-once = hyprctl dispatch exec '[workspace 6 silent] steam'

# Forcer le focus sur le workspace 1
exec-once = hyprctl dispatch workspace 1

# Forcer les apps à toujours s'ouvrir sur les workspaces spécifiques
windowrule {
  name = windowrule-1
  workspace = 2
  match:class = ^(vivaldi)$
}

windowrule {
  name = windowrule-2
  workspace = 3
  match:class = ^(obsidian)$
}

windowrule {
  name = windowrule-3
  workspace = 4
  match:class = ^(discord)$
}

windowrule {
  name = windowrule-4
  workspace = 5
  match:class = ^(thunderbird)$
}

windowrule {
  name = windowrule-5
  workspace = 6
  match:class = ^(steam)$
}


#############################
### ENVIRONMENT VARIABLES ###
#############################

# Curseur
# Définir le thème pour les applications XTHEME
exec-once = gsettings set org.gnome.desktop.interface cursor-theme BreezeX-RosePine-Linux
exec-once = gsettings set org.gnome.desktop.interface cursor-size 34

###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = nautilus
$browser = vivaldi
$menu = ~/.config/rofi/launchers/type-2/launcher.sh
$notes = obsidian

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Utiliser "Windows" key comme main modifier

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = ALT, W, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, fullscreen
bind = $mainMod, O, exec, $notes
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, S, exec, hyprshot -m region -c -o ~/Pictures/Screenshots
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/scripts/refresh.sh
bind = $mainMod SHIFT, Q, exec, wlogout

# Move focus with ALT + hjkl
bind = ALT, H, movefocus, l
bind = ALT, J, movefocus, d
bind = ALT, K, movefocus, u
bind = ALT, L, movefocus, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switch workspaces with mainMod + A/R/S/T/G/M/N
bind = $mainMod, A, workspace, 1
bind = $mainMod, R, workspace, 2
bind = $mainMod, S, workspace, 3
bind = $mainMod, T, workspace, 4
bind = $mainMod, G, workspace, 5
bind = $mainMod, M, workspace, 6
bind = $mainMod, N, workspace, 7

# Move active window to a workspace with mainMod + ALT + A/R/S/T/G/M/N
bind = $mainMod ALT, A, movetoworkspace, 1
bind = $mainMod ALT, R, movetoworkspace, 2
bind = $mainMod ALT, S, movetoworkspace, 3
bind = $mainMod ALT, T, movetoworkspace, 4
bind = $mainMod ALT, G, movetoworkspace, 5
bind = $mainMod ALT, M, movetoworkspace, 6
bind = $mainMod ALT, N, movetoworkspace, 7

# Scroll through existing workspaces with mainMod + left/right
bind = $mainMod, right, workspace, e+1
bind = $mainMod, left, workspace, e-1

# Switch to previous workspace
bind = $mainMod, TAB, workspace, previous

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Rotation des fenêtres dans le layout dwindle
bind = $mainMod, TAB, swapnext

# Resize au clavier (pas à pas)
bind = $mainMod ALT, H, resizeactive, -60 0    # agrandir à gauche / rétrécir à droite
bind = $mainMod ALT, L, resizeactive,  60 0    # agrandir à droite / rétrécir à gauche
bind = $mainMod ALT, K, resizeactive,  0 -60   # agrandir en haut / rétrécir en bas
bind = $mainMod ALT, J, resizeactive,  0  60   # agrandir en bas / rétrécir en haut
bind = $mainMod CTRL, left, resizeactive, -60 0    # agrandir à gauche / rétrécir à droite
bind = $mainMod CTRL, right, resizeactive,  60 0    # agrandir à droite / rétrécir à gauche
bind = $mainMod CTRL, up, resizeactive,  0 -60   # agrandir en haut / rétrécir en bas
bind = $mainMod CTRL, down, resizeactive,  0  60   # agrandir en bas / rétrécir en haut

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

#####################
### LOOK AND FEEL ###
#####################

env = GTK_THEME,Adwaita:dark
exec = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps

general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.active_border = $color10 $color11  45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 5
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ajout de blur à waybar
# layerrule = blur on, match:namespace waybar

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

input {
    kb_layout = ca
    kb_variant = multix
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# Example per-device config
device {
    name = logitech-g502-1
    sensitivity = -0.2
    accel_profile = flat
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps.
windowrule {
  name = windowrule-6
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-7
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# Transparence de ghostty
windowrule {
  name = windowrule-8
  opacity = 1.0 1.0
  scroll_touchpad = 1
  match:class = ^(ghostty|com\.mitchellh\.ghostty)$
}

