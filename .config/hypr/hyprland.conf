################
### SOURCES  ###
################
source = ~/.cache/wal/colors-hyprland.conf

################
### MONITORS ###
################

monitor=eDP-1,preferred,auto,1      # Laptop
monitor=DP-3,3440x1440@144,0x0,1    # PC

#################
### AUTOSTART ###
#################

# Appliquer les couleurs du dernier thème wal
exec-once = wal -R

# Sécurité: verrouille immédiatement au démarrage ou quitte si hyprlock échoue
exec-once = hyprlock || hyprctl dispatch exit

# Démarrer les services principaux
exec-once = waybar & hyprpaper & hypridle
exec-once = swaync                            # Notification Daemon

# Mes applications par défaut
exec-once = hyprctl dispatch exec '[workspace 1 silent] kitty'
exec-once = hyprctl dispatch exec '[workspace 2 silent] vivaldi'
exec-once = hyprctl dispatch exec '[workspace 3 silent] obsidian'
exec-once = hyprctl dispatch exec '[workspace 4 silent] discord'
exec-once = hyprctl dispatch exec '[workspace 5 silent] thunderbird'
exec-once = hyprctl dispatch exec '[workspace 6 silent] steam'

# Forcer le focus sur le workspace 1
exec-once = hyprctl dispatch workspace 1

# Forcer les apps à toujours s'ouvrir sur les workspaces spécifiques
windowrulev2 = workspace 2, class:^(vivaldi)$
windowrulev2 = workspace 3, class:^(obsidian)$
windowrulev2 = workspace 4, class:^(discord)$
windowrulev2 = workspace 5, class:^(thunderbird)$
windowrulev2 = workspace 6, class:^(steam)$

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Curseur
# Définir le thème pour les applications XTHEME
exec-once = gsettings set org.gnome.desktop.interface cursor-theme BreezeX-RosePine-Linux
exec-once = gsettings set org.gnome.desktop.interface cursor-size 34

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus
$browser = vivaldi
$menu = ~/.config/rofi/launchers/type-2/launcher.sh
$notes = obsidian

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Utiliser "Windows" key comme main modifier

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, X, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, fullscreen
bind = $mainMod, O, exec, $notes
bind = $mainMod ALT, L, exec, hyprlock
bind = $mainMod SHIFT, S, exec, hyprshot -m region -c -o ~/Pictures/Screenshots
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/scripts/refresh.sh 
bind = $mainMod SHIFT, Q, exec, wlogout

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + ALT + H/L
bind = $mainMod SHIFT, L, workspace, e+1
bind = $mainMod SHIFT, H, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Rotation des fenêtres dans le layout dwindle
bind = $mainMod, TAB, swapnext

# Resize au clavier (pas à pas)
bind = $mainMod CTRL, h, resizeactive, -60 0    # agrandir à gauche / rétrécir à droite
bind = $mainMod CTRL, l, resizeactive,  60 0    # agrandir à droite / rétrécir à gauche
bind = $mainMod CTRL, k, resizeactive,  0 -60   # agrandir en haut / rétrécir en bas
bind = $mainMod CTRL, j, resizeactive,  0  60   # agrandir en bas / rétrécir en haut

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

#####################
### LOOK AND FEEL ###
#####################

exec = gtk-application-prefer-dark-theme = true
exec = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps

general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.active_border = $color10 $color11  45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 5
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ajout de blur à waybar
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = ignorealpha 0.5, waybar

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

input {
    kb_layout = ca
    kb_variant = multix
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# Example per-device config
device {
    name = logitech-g502-1
    sensitivity = -0.2
    accel_profile = flat
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Transparence de kitty
windowrulev2 = opacity 0.90 0.90, class:^(kitty)$
windowrulev2 = scrolltouchpad 1, class:^(kitty)$
