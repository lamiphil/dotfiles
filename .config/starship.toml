# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$localip\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$kubernetes\
$docker_context\
$package\
$c\
$golang\
$helm\
$java\
$lua\
$nodejs\
$python\
$terraform\
$conda\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$direnv\
$env_var\
$custom\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$time\
$status\
$os\
$container\
$shell\
$character"""

# Inserts a blank line between shell prompts
add_newline = true

[character] # The name of the module we are configuring is 'character'
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red) '

[directory]
format = 'in [$path]($style)[$read_only]($read_only_style) '
truncation_symbol = "..."
truncate_to_repo = true
read_only = " 󰌾"

[username]
style_user = "blue"
style_root = "red blink"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_symbol = " "
ssh_only = true
format = 'on [$hostname](bold yellow) '
trim_at = "."
disabled = false

[git_branch]
format = 'on [$symbol$branch(:$remote_branch)]($style)'
symbol = " "

[git_commit]
tag_symbol = '  '

[kubernetes]
contexts = [
  { context_pattern = "*po", style = "blink red", context_alias = "prod"},
  { context_pattern = "*ti", style = "green", context_alias = "ti" },
]
format = ' [☸ $context]($style) '
disabled = false
